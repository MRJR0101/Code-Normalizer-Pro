name: "Code Normalizer Pro"
description: "Normalizes code encodings, line endings, and whitespace. Fails if any files need normalization."
inputs:
  args:
    description: "Arguments to pass to code-normalizer-pro"
    required: false
    default: ". --dry-run --fail-on-changes"
runs:
  using: "composite"
  steps:
    - run: pip install ${{ github.action_path }}
      shell: bash
    - run: code-normalizer-pro ${{ inputs.args }}
      shell: bash
