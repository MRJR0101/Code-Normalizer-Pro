name: Bug report
description: Report a reproducible problem in CODE.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Commands and files needed to reproduce.
      placeholder: |
        python src/code_normalize_pro.py <path> --dry-run
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: CLI version or commit hash.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, shell.

