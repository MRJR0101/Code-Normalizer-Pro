name: Monthly Metrics

on:
  schedule:
    - cron: "0 9 1 * *"   # 09:00 UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

jobs:
  update-metrics:
    name: Refresh launch and sales metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated JSON files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run launch metrics
        run: python scripts/launch_metrics.py

      - name: Run sales pipeline metrics
        run: python scripts/sales_pipeline_metrics.py

      - name: Run release readiness check
        run: python scripts/release_prep.py || true   # non-zero is informational

      - name: Commit updated metrics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/launch/metrics_summary.json \
                  docs/sales/pipeline_metrics.json \
                  docs/release/release_readiness.json
          git diff --cached --quiet || \
            git commit -m "chore: monthly metrics refresh [skip ci]"
          git push
