name: Quarterly Tech Debt Review

on:
  schedule:
    # 09:00 UTC on the 1st of January, April, July, October
    - cron: "0 9 1 1,4,7,10 *"
  workflow_dispatch:

jobs:
  open-review-issue:
    name: Open tech debt review issue
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get quarter label
        id: quarter
        run: |
          MONTH=$(date +%-m)
          YEAR=$(date +%Y)
          if   [ $MONTH -le 3 ];  then Q="Q1"
          elif [ $MONTH -le 6 ];  then Q="Q2"
          elif [ $MONTH -le 9 ];  then Q="Q3"
          else                         Q="Q4"
          fi
          echo "label=$Q $YEAR" >> "$GITHUB_OUTPUT"

      - name: Open review issue
        uses: actions/github-script@v7
        with:
          script: |
            const quarter = '${{ steps.quarter.outputs.label }}';
            const body = [
              '## ' + quarter + ' Tech Debt Review',
              '',
              'Quarterly reminder to triage open items and re-prioritize the backlog.',
              '',
              '### Checklist',
              '',
              '- [ ] Read through `MISSINGMORE.txt` — close resolved items, add new ones',
              '- [ ] Review open GitHub Issues tagged `tech-debt`',
              '- [ ] Check `PROJECT_CHECKLIST.md` for newly completable items',
              '- [ ] Run `python scripts/release_prep.py` and verify output',
              '- [ ] Run `python scripts/launch_metrics.py` and review trends',
              '- [ ] Review Dependabot PRs — merge or close stale ones',
              '- [ ] Check for outdated version references across docs',
              '- [ ] Decide: any post-launch items ready to promote to blocking?',
              '',
              '### Post-launch items currently deferred',
              '',
              '- Pre-commit hooks (`.pre-commit-config.yaml`)',
              '- `pip-audit` in CI',
              '- `--purge-cache` / `--purge-backups` flags',
              '- `test_backup_restores_original` regression test',
              '- `examples/` directory content',
              '- Profiling baseline doc',
              '',
              '_Auto-opened by `.github/workflows/quarterly_review.yml`_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: quarter + ' Tech Debt Review',
              body: body,
              labels: ['tech-debt', 'maintenance'],
            });
